<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Nibgate Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .admin-table th {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .admin-table td {
            font-family: 'Inter', sans-serif;
        }
        .article-title {
            font-weight: 600;
            color: var(--text-color);
        }
        .toggle-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .btn-gated {
            background: #ff4757;
            color: white;
        }
        .btn-free {
            background: #2ed573;
            color: white;
        }
        .toggle-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Admin <span>Panel</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Home</a></li>
        </ul>
    </nav>
    <div class="admin-container">
        <div class="admin-header">
            <h2>Manage Content Gating</h2>
            <p>Toggle which articles require payment via Nibgate.</p>
        </div>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Access Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <!-- Rows injected via JS -->
            </tbody>
        </table>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
