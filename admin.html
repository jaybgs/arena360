<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Nibgate Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 20px;
        }
        
        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-card h2 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        .login-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        .login-input:focus {
            border-color: var(--primary-color);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-color);
            color: #000000;
            border: 3px solid #000000;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        .admin-container {
            display: none;
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .admin-table th, .admin-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .admin-table th {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .admin-table td {
            font-family: 'Inter', sans-serif;
            vertical-align: middle;
        }
        
        .article-title {
            font-weight: 600;
            color: var(--text-color);
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .price-input {
            width: 80px;
            padding: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            text-align: right;
            margin-right: 5px;
        }
        
        .price-container {
            display: flex;
            align-items: center;
        }
        
        .action-container {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        
        .save-btn {
            background: var(--primary-color);
            color: white;
        }
        
        .toggle-btn {
            flex-grow: 1;
        }
        
        .btn-gated {
            background: #ff4757;
            color: white;
        }
        .btn-free {
            background: #2ed573;
            color: white;
        }
        
        .action-btn:hover {
            opacity: 0.9;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge-free {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
        }

        .badge-gated {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="background-elements">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo">Admin <span>Panel</span></div>
        <ul class="nav-links">
            <li><a href="/">Back to Home</a></li>
        </ul>
        <div class="theme-toggle" id="themeToggle">
            <svg class="sun" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon hidden" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </div>
    </nav>
    
    <div class="admin-wrapper" id="loginWrapper">
        <div class="login-card">
            <h2>Admin Login</h2>
            <p>Enter your password to access the control panel.</p>
            <form id="loginForm">
                <input type="password" id="adminPassword" class="login-input" placeholder="Password" required>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <p id="loginError" style="color:#ff4757; margin-top:15px; display:none;">Incorrect password.</p>
        </div>
    </div>

    <div class="admin-container" id="adminPanel">
        <div class="admin-header">
            <div>
                <h2>Manage Content Gating</h2>
                <p style="color: var(--text-muted); margin-top: 5px;">Configure access rules and prices for all articles.</p>
            </div>
            <button id="logoutBtn" class="action-btn" style="background:var(--bg-color); color:var(--text-color); border:1px solid var(--border-color);">Logout</button>
        </div>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Price (USDC)</th>
                    <th>Seller Address (Recipient)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <!-- Rows injected via JS -->
            </tbody>
        </table>
    </div>
    
    <script type="module" src="admin-v2.js"></script>
</body>
</html>
